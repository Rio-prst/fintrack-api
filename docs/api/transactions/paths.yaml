paths:
  /transactions:
    post:
      tags: [Transactions]
      summary: Create transaction
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../common/schemas.yaml#/components/schemas/TransactionCreate
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../common/schemas.yaml#/components/schemas/ApiResponse
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transaction:
                            $ref: ../common/schemas.yaml#/components/schemas/Transaction
        "400":
          $ref: ../common/responses.yaml#/components/responses/BadRequest

    get:
      tags: [Transactions]
      summary: List user transactions
      operationId: listTransactions
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Transactions listed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../common/schemas.yaml#/components/schemas/ApiResponse
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: ../common/schemas.yaml#/components/schemas/Transaction
                      meta:
                        $ref: ../common/schemas.yaml#/components/schemas/Pagination

  /transactions/summary:
    get:
      tags: [Transactions]
      summary: Get transaction summary
      operationId: getTransactionSummary
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Summary retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../common/schemas.yaml#/components/schemas/ApiResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../common/schemas.yaml#/components/schemas/SummaryResponse

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction by ID
      operationId: getTransactionById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../common/schemas.yaml#/components/schemas/ApiResponse
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transaction:
                            $ref: ../common/schemas.yaml#/components/schemas/Transaction
        "403":
          $ref: ../common/responses.yaml#/components/responses/Forbidden
        "404":
          $ref: ../common/responses.yaml#/components/responses/NotFound

    patch:
      tags: [Transactions]
      summary: Update transaction
      operationId: updateTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../common/schemas.yaml#/components/schemas/TransactionUpdate
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../common/schemas.yaml#/components/schemas/ApiResponse
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transaction:
                            $ref: ../common/schemas.yaml#/components/schemas/Transaction
        "403":
          $ref: ../common/responses.yaml#/components/responses/Forbidden
        "404":
          $ref: ../common/responses.yaml#/components/responses/NotFound

    delete:
      tags: [Transactions]
      summary: Delete transaction
      operationId: deleteTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Transaction deleted
        "403":
          $ref: ../common/responses.yaml#/components/responses/Forbidden
        "404":
          $ref: ../common/responses.yaml#/components/responses/NotFound
