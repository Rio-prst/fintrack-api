openapi: 3.1.0
info:
  title: Finance Tracker API
  version: 1.0.0
  description: Personal finance tracking REST API

servers:
  - url: http://localhost:3000

paths:
  /auth/register:
    $ref: ./auth/paths.yaml#/paths/~1auth~1register
  /auth/login:
    $ref: ./auth/paths.yaml#/paths/~1auth~1login
  /auth/rotate:
    $ref: ./auth/paths.yaml#/paths/~1auth~1rotate
  /auth/logout:
    $ref: ./auth/paths.yaml#/paths/~1auth~1logout
  /auth/me:
    $ref: ./auth/paths.yaml#/paths/~1auth~1me
  /users/{id}:
    $ref: ./users/paths.yaml#/paths/~1users~1{id}
  /categories:
    $ref: ./categories/paths.yaml#/paths/~1categories
  /categories/{id}:
    $ref: ./categories/paths.yaml#/paths/~1categories~1{id}
  /transactions:
    $ref: ./transactions/paths.yaml#/paths/~1transactions
  /transactions/summary:
    $ref: ./summary/paths.yaml#/paths/~1transactions~1summary
  /transactions/{id}:
    $ref: ./transactions/paths.yaml#/paths/~1transactions~1{id}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
